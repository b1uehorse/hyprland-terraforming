# ======== внешний вид ========
font_family      JetBrainsMono Nerd Font
font_size        13.0
background_opacity 0.75
dynamic_background_opacity yes
cursor_shape     beam
cursor_blink_interval 0.5
window_padding_width 8

# ======== поведение ========
allow_remote_control yes
listen_on unix:/tmp/kitty-${USER}
confirm_os_window_close 0
enable_audio_bell no
scrollback_lines 10000

# ======== копирование/вставка (с сохранением SIGINT) ========
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# ======== вкладки ========
map ctrl+t new_tab
map ctrl+w close_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+left  previous_tab
map alt+right next_tab

# ======== сплиты (windows внутри таба) ========
map ctrl+d launch --location=vsplit --cwd=current
map ctrl+shift+d launch --location=hsplit --cwd=current
map ctrl+shift+w close_window
map alt+up    neighboring_window up
map alt+down  neighboring_window down

# ======== размер шрифта на лету ========
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# copy-on-select в системный буфер
copy_on_select clipboard
